<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/globe.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>Atlas · AI Travel Concierge — Explore India & the world</title>

    <!-- SEO -->
    <meta
      name="description"
      content="Atlas is an AI travel concierge: explore destinations, uncover real hidden gems near you, get day-by-day plans, live weather and honest costs — for India and beyond."
    />
    <meta name="theme-color" content="#070b18" />

    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Atlas" />

      name="twitter:description"
      content="Explore destinations & hidden gems near you with an AI travel concierge."
    />

    <link rel="manifest" href="/manifest.webmanifest" />
    <link rel="apple-touch-icon" href="/pwa-icon.svg" />

    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
